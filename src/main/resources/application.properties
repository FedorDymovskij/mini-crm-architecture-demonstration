spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
#
#
#
spring.application.name=security-demonstration
server.port=${APP_SERVER_PORT:8080}
spring.datasource.username=${APP_POSTGRES_USER:postgres_user}
spring.datasource.password=${APP_POSTGRES_PASSWORD:postgres_password}
spring.datasource.url=jdbc:postgresql://${APP_DB_HOST:localhost}:${APP_POSTGRES_PORT:5433}/${APP_POSTGRES_DB:postgres}
#
app.security.jwt.secret-key=${APP_JWT_SECRET_KEY:my-super-amazing-mega-secret-key}
app.security.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:60000}
app.security.refresh-token.expiration-ms=${APP_REFRESH_TOKEN_EXPIRATION_MS:604800000}