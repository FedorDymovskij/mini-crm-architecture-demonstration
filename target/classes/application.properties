spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
#
#
#
spring.application.name=security-demonstration
server.port=${APP_SERVER_PORT:8080}
spring.datasource.username=${APP_POSTGRES_USER:postgres_user}
spring.datasource.password=${APP_POSTGRES_PASSWORD:postgres_password}
spring.datasource.url=jdbc:postgresql://${APP_DB_HOST:localhost}:${APP_POSTGRES_PORT:5433}/${APP_POSTGRES_DB:crm_DDD_postgres}
#
app.security.access-token.secret-key=${APP_SECURITY_ACCESS_TOKEN_SECRET_KEY:my-super-amazing-mega-secret-key}
app.security.access-token.expiration-ms=${APP_SECURITY_ACCESS_TOKEN_EXPIRATION_MS:180000}